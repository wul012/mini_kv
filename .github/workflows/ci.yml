name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_parallel: 4
          - os: macos-latest
            build_parallel: 2
          - os: windows-latest
            build_parallel: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        timeout-minutes: 45
        run: cmake --build build --config Debug --parallel ${{ matrix.build_parallel }} --verbose

      - name: Test
        timeout-minutes: 30
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 120 --progress
