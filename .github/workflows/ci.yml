name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format changed files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format when missing
        run: |
          if ! command -v clang-format >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y clang-format
          fi
          clang-format --version

      - name: Check changed C++ files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          python3 scripts/check_clang_format_changed_files.py --base "$base" --head HEAD

  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_parallel: 4
          - os: macos-latest
            build_parallel: 2
          - os: windows-latest
            build_parallel: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        timeout-minutes: 45
        run: cmake --build build --config Debug --parallel ${{ matrix.build_parallel }} --verbose

      - name: Test
        timeout-minutes: 30
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 120 --progress

  sanitizer:
    name: ubuntu sanitizer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure sanitizer build
        run: cmake -S . -B build-sanitize -DCMAKE_BUILD_TYPE=Debug -DMINIKV_SANITIZE=ON

      - name: Build sanitizer target set
        timeout-minutes: 45
        run: cmake --build build-sanitize --config Debug --parallel 4 --verbose

      - name: Test sanitizer build
        timeout-minutes: 30
        run: ctest --test-dir build-sanitize -C Debug --output-on-failure --timeout 120 --progress

  coverage:
    name: ubuntu coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y gcovr
          gcovr --version

      - name: Configure coverage build
        run: cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DMINIKV_COVERAGE=ON

      - name: Build coverage target set
        timeout-minutes: 45
        run: cmake --build build-coverage --config Debug --parallel 4 --verbose

      - name: Test coverage build
        timeout-minutes: 30
        run: ctest --test-dir build-coverage -C Debug --output-on-failure --timeout 120 --progress

      - name: Generate core coverage report
        run: |
          mkdir -p coverage
          gcovr --root . --object-directory build-coverage --filter "src/(store|command|command_catalog|command_contracts|command_response_formatters|command_smoke_formatters|wal|snapshot|resp)\\.cpp" --gcov-ignore-parse-errors negative_hits.warn_once_per_file --txt coverage/core-coverage.txt --html-details coverage/core-coverage.html
          cat coverage/core-coverage.txt

      - name: Upload core coverage report
        uses: actions/upload-artifact@v4
        with:
          name: mini-kv-core-coverage
          path: coverage/
