name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format changed files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format when missing
        run: |
          if ! command -v clang-format >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y clang-format
          fi
          clang-format --version

      - name: Check changed C++ files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          python3 scripts/check_clang_format_changed_files.py --base "$base" --head HEAD

  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_parallel: 4
          - os: macos-latest
            build_parallel: 2
          - os: windows-latest
            build_parallel: 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        timeout-minutes: 45
        run: cmake --build build --config Debug --parallel ${{ matrix.build_parallel }} --verbose

      - name: Test
        timeout-minutes: 30
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 120 --progress
